<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#2563eb" />
  <title>ระบบดูแลผู้มีภาวะพึ่งพิงในชุมชน</title>

  <!-- ===== Google Font: Kanit ===== -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">



  <!-- ===== Tailwind CSS (CDN) ===== -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    // ธีมโทนทอง-ครีม อิง CSS variables (รองรับโหมดมืด) + ฟอนต์ Kanit
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary:     'rgb(var(--c-primary) / <alpha-value>)',
            'primary-2': 'rgb(var(--c-primary2) / <alpha-value>)',
            secondary:   'rgb(var(--c-secondary) / <alpha-value>)',
            bg:          'rgb(var(--c-bg) / <alpha-value>)',
            card:        'rgb(var(--c-card) / <alpha-value>)',
            ink:         'rgb(var(--c-ink) / <alpha-value>)',
            muted:       'rgb(var(--c-muted) / <alpha-value>)',
            line:        'rgb(var(--c-border) / <alpha-value>)',
            subtle:      'rgb(var(--c-bg2) / <alpha-value>)',
            success:     'rgb(var(--c-success) / <alpha-value>)',
            warning:     'rgb(var(--c-warning) / <alpha-value>)',
            danger:      'rgb(var(--c-danger) / <alpha-value>)',
          },
          fontFamily: { sans: ['Kanit', 'ui-sans-serif', 'system-ui', 'sans-serif'] },
          boxShadow: {
            soft: '0 4px 24px rgba(0,0,0,.10)',
            card: '0 2px 16px rgba(0,0,0,.07)',
          },
          borderRadius: { xl: '0.875rem', '2xl': '1rem' }
        }
      }
    }
  </script>

  <!-- ===== SweetAlert2 ===== -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <!-- ===== Leaflet.js (ใช้ในฟอร์มบันทึกพิกัด) ===== -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- ===== Lucide Icons ===== -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- ===== Flatpickr (ปฏิทินเลือกวันที่ แสดงปี พ.ศ.) ===== -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/flatpickr.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/flatpickr.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/l10n/th.js"></script>

  <style>
    /* ============================================================
     * Apple-style Design System
     *   Palette : iOS system (BG #F6F6F8 / Blue #0A84FF)
     *   Glass   : blur 28px + saturate 180% + 0.5px hairline
     *   Shadow  : layered ambient + key
     *   Motion  : ease-out cubic-bezier(0.16,1,0.3,1) + spring
     * ============================================================ */
    :root{
      --c-primary:10 132 255;       /* SF Blue */
      --c-primary2:0 102 204;
      --c-secondary:48 209 88;      /* SF Green */
      --c-bg:246 246 248;           /* systemGray6 */
      --c-bg2:242 242 247;
      --c-card:255 255 255;
      --c-border:229 229 234;
      --c-ink:28 28 30;
      --c-muted:99 99 102;
      --c-success:52 199 89; --c-warning:255 159 10; --c-danger:255 69 58;

      --shadow-xs:0 1px 2px rgba(15,23,42,.04);
      --shadow-sm:0 1px 2px rgba(15,23,42,.04), 0 2px 6px rgba(15,23,42,.04);
      --shadow-md:0 1px 2px rgba(15,23,42,.04), 0 8px 24px rgba(15,23,42,.06);
      --shadow-lg:0 4px 12px rgba(15,23,42,.06), 0 24px 48px rgba(15,23,42,.08);
      --shadow-xl:0 8px 24px rgba(15,23,42,.08), 0 32px 64px rgba(15,23,42,.10);

      --ease-out:cubic-bezier(0.16, 1, 0.3, 1);
      --ease-spring:cubic-bezier(0.34, 1.56, 0.64, 1);
      --ease-smooth:cubic-bezier(0.4, 0, 0.2, 1);
    }
    html.dark{
      --c-primary:10 132 255; --c-primary2:64 156 255; --c-secondary:48 209 88;
      --c-bg:0 0 0; --c-bg2:28 28 30; --c-card:28 28 30;
      --c-border:56 56 58; --c-ink:245 245 247; --c-muted:152 152 157;
      --c-success:48 209 88; --c-warning:255 159 10; --c-danger:255 69 58;
    }

    *{ -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; }

    html, body {
      font-family:'Kanit',sans-serif; color:rgb(var(--c-ink));
      letter-spacing:-0.005em;
      -webkit-tap-highlight-color:transparent;
      transition:background .5s var(--ease-smooth), color .3s var(--ease-smooth);
      background:
        radial-gradient(1200px 600px at 92% -8%,  rgba(10,132,255,.08),  transparent 55%),
        radial-gradient(900px  500px at -8% 108%, rgba(94,92,230,.06),   transparent 55%),
        rgb(var(--c-bg));
      background-attachment:fixed;
    }
    html.dark body {
      background:
        radial-gradient(1200px 600px at 92% -8%,  rgba(10,132,255,.18),  transparent 55%),
        radial-gradient(900px  500px at -8% 108%, rgba(94,92,230,.12),   transparent 55%),
        rgb(var(--c-bg));
    }

    input, select, textarea, button { font-family:'Kanit',sans-serif; letter-spacing:-0.005em; }
    input, select, textarea { transition:border-color .2s var(--ease-smooth), box-shadow .2s var(--ease-smooth), background .2s; }
    input:focus, select:focus, textarea:focus { outline:none; box-shadow:0 0 0 4px rgba(10,132,255,.12); }

    /* ============ Glass cards ============ */
    .bg-card.shadow-card, .bg-card.shadow-soft {
      background-color: rgba(255,255,255,.72) !important;
      backdrop-filter: blur(28px) saturate(180%);
      -webkit-backdrop-filter: blur(28px) saturate(180%);
      border: 0.5px solid rgba(255,255,255,.7);
      box-shadow: var(--shadow-md);
    }
    html.dark .bg-card.shadow-card, html.dark .bg-card.shadow-soft {
      background-color: rgba(28,28,30,.7) !important;
      border-color: rgba(255,255,255,.08);
      box-shadow: 0 1px 2px rgba(0,0,0,.5), 0 12px 32px rgba(0,0,0,.4);
    }

    /* Frosted chrome */
    #sidebar, #appHeader {
      background: rgba(255,255,255,.72) !important;
      backdrop-filter: blur(28px) saturate(180%);
      -webkit-backdrop-filter: blur(28px) saturate(180%);
      border-color: rgba(0,0,0,.06) !important;
    }
    html.dark #sidebar, html.dark #appHeader {
      background: rgba(28,28,30,.72) !important; border-color: rgba(255,255,255,.08) !important;
    }
    #bottomNav {
      background: rgba(255,255,255,.82) !important;
      backdrop-filter: blur(28px) saturate(180%);
      -webkit-backdrop-filter: blur(28px) saturate(180%);
      border-color: rgba(0,0,0,.06) !important;
    }
    html.dark #bottomNav { background: rgba(28,28,30,.82) !important; border-color: rgba(255,255,255,.08) !important; }

    /* ============ Loading overlay ============ */
    #loadingOverlay {
      position:fixed; inset:0; z-index:9999;
      background:rgba(0,0,0,.25);
      backdrop-filter:blur(12px) saturate(180%);
      -webkit-backdrop-filter:blur(12px) saturate(180%);
      display:none; align-items:center; justify-content:center;
    }
    #loadingOverlay.show { display:flex; animation:ov-in .25s var(--ease-out); }
    @keyframes ov-in { from { opacity:0; } to { opacity:1; } }
    #loadingOverlay .lbox {
      background:rgba(255,255,255,.92);
      backdrop-filter:blur(32px) saturate(180%);
      -webkit-backdrop-filter:blur(32px) saturate(180%);
      border:0.5px solid rgba(255,255,255,.85);
      border-radius:22px; padding:28px 36px;
      display:flex; flex-direction:column; align-items:center; gap:14px;
      box-shadow:var(--shadow-xl);
      animation:lbox-in .35s var(--ease-spring);
    }
    html.dark #loadingOverlay .lbox { background:rgba(44,44,46,.92); border-color:rgba(255,255,255,.08); }
    @keyframes lbox-in {
      from { opacity:0; transform:scale(.92) translateY(8px); }
      to   { opacity:1; transform:scale(1) translateY(0); }
    }
    .spinner {
      width:36px; height:36px; border-radius:50%;
      border:2.5px solid rgba(10,132,255,.14);
      border-top-color:rgb(var(--c-primary));
      animation:spin .9s cubic-bezier(0.6,0.2,0.4,0.8) infinite;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
    #loadingText { font-size:13px; font-weight:500; letter-spacing:0; color:rgb(var(--c-muted)); }

    /* ============ Drawer ============ */
    #drawerBackdrop {
      position:fixed; inset:0;
      background:rgba(0,0,0,.4);
      backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
      z-index:60; opacity:0; pointer-events:none;
      transition:opacity .35s var(--ease-out);
    }
    #drawerBackdrop.show { opacity:1; pointer-events:auto; }
    #drawer {
      position:fixed; top:0; left:0; height:100%;
      width:84%; max-width:320px;
      background:rgba(255,255,255,.88);
      backdrop-filter:blur(28px) saturate(180%);
      -webkit-backdrop-filter:blur(28px) saturate(180%);
      z-index:61; transform:translateX(-100%);
      transition:transform .4s var(--ease-out);
      box-shadow:0 20px 60px rgba(0,0,0,.18);
    }
    html.dark #drawer { background:rgba(28,28,30,.88); }
    #drawer.show { transform:translateX(0); }

    /* ============ Scrollbar ============ */
    ::-webkit-scrollbar { width:6px; height:6px; }
    ::-webkit-scrollbar-thumb { background:rgba(0,0,0,.15); border-radius:999px; }
    ::-webkit-scrollbar-thumb:hover { background:rgba(0,0,0,.28); }
    html.dark ::-webkit-scrollbar-thumb { background:rgba(255,255,255,.15); }
    html.dark ::-webkit-scrollbar-thumb:hover { background:rgba(255,255,255,.28); }

    /* ============ Nav items ============ */
    .nav-item { transition: background .25s var(--ease-smooth), color .2s var(--ease-smooth), transform .15s var(--ease-out); }
    .nav-item:hover { background: rgba(60,60,67,.06); }
    html.dark .nav-item:hover { background: rgba(255,255,255,.06); }
    .nav-item.active { background: rgba(10,132,255,.10); color: rgb(var(--c-primary2)); font-weight:600; }
    .nav-item.active i { color: rgb(var(--c-primary)); }
    html.dark .nav-item.active { background: rgba(10,132,255,.16); color: rgb(var(--c-primary)); }
    .bottom-item { transition: color .2s var(--ease-smooth), transform .15s var(--ease-spring); }
    .bottom-item:active { transform: scale(.92); }
    .bottom-item.active { color: rgb(var(--c-primary)); }
    .bottom-item.active i { color: rgb(var(--c-primary)); }

    /* ============ Buttons — iOS tinted + haptic feedback ============ */
    .btn {
      transition:
        transform .15s var(--ease-spring),
        box-shadow .25s var(--ease-smooth),
        filter .2s var(--ease-smooth),
        background .2s var(--ease-smooth),
        opacity .2s var(--ease-smooth);
    }
    .btn:hover { filter: brightness(1.04); }
    /* Haptic-style press : nudge in + subtle inset */
    .btn:active {
      transform: scale(.96);
      filter: brightness(.96);
      transition-duration: .08s;
    }

    /* Primary gradient + glow */
    .bg-primary {
      background: linear-gradient(135deg, rgb(var(--c-primary)) 0%, rgb(var(--c-primary2)) 100%) !important;
      box-shadow: 0 1px 2px rgba(10,132,255,.18), 0 4px 12px rgba(10,132,255,.18);
    }
    .bg-primary:hover { box-shadow: 0 2px 4px rgba(10,132,255,.22), 0 8px 24px rgba(10,132,255,.30); }

    /* iOS tinted buttons : translucent fill, vibrant text — used by */
    /* bg-success/10, bg-primary/10, bg-danger/10, bg-warning/10, bg-secondary/15 */
    button[class*="bg-success/"], button[class*="bg-primary/"],
    button[class*="bg-warning/"], button[class*="bg-danger/"],
    button[class*="bg-secondary/"] {
      backdrop-filter: blur(10px) saturate(180%);
      -webkit-backdrop-filter: blur(10px) saturate(180%);
      border: 0.5px solid transparent;
    }
    button.bg-primary\/10:hover  { background: rgba(10,132,255,.16) !important;  border-color: rgba(10,132,255,.18); }
    button.bg-success\/10:hover  { background: rgba(52,199,89,.16) !important;   border-color: rgba(52,199,89,.18); }
    button.bg-warning\/10:hover  { background: rgba(255,159,10,.16) !important;  border-color: rgba(255,159,10,.18); }
    button.bg-danger\/10:hover   { background: rgba(255,69,58,.16) !important;   border-color: rgba(255,69,58,.18); }
    button.bg-secondary\/15:hover{ background: rgba(48,209,88,.22) !important;   border-color: rgba(48,209,88,.22); }

    /* ============ Login Mesh — Apple Wallpaper style ============ */
    .login-hero {
      position: relative; overflow: hidden;
      background:
        radial-gradient(800px 600px at 15% 20%,  rgba(10,132,255,.55), transparent 55%),
        radial-gradient(700px 500px at 85% 30%,  rgba(94,92,230,.50),  transparent 55%),
        radial-gradient(900px 700px at 50% 110%, rgba(191,90,242,.55), transparent 60%),
        radial-gradient(500px 400px at 90% 90%,  rgba(255,69,85,.35),  transparent 55%),
        #0A0A1A;
    }
    .login-hero::before, .login-hero::after {
      content:''; position:absolute; border-radius:50%; filter: blur(80px);
      pointer-events:none;
    }
    .login-hero::before {
      width: 360px; height: 360px;
      background: radial-gradient(circle, rgba(10,132,255,.45), transparent 70%);
      top:-100px; left:-80px;
      animation: orb-drift-1 18s var(--ease-smooth) infinite alternate;
    }
    .login-hero::after {
      width: 420px; height: 420px;
      background: radial-gradient(circle, rgba(191,90,242,.45), transparent 70%);
      bottom:-140px; right:-100px;
      animation: orb-drift-2 22s var(--ease-smooth) infinite alternate;
    }
    @keyframes orb-drift-1 { from { transform: translate(0,0); } to { transform: translate(80px, 60px); } }
    @keyframes orb-drift-2 { from { transform: translate(0,0); } to { transform: translate(-60px,-80px); } }

    .login-card {
      position: relative; z-index: 1;
      background: rgba(255,255,255,.78) !important;
      backdrop-filter: blur(32px) saturate(180%);
      -webkit-backdrop-filter: blur(32px) saturate(180%);
      border: 0.5px solid rgba(255,255,255,.85);
      box-shadow:
        0 1px 2px rgba(0,0,0,.06),
        0 24px 60px rgba(10,15,40,.25),
        0 40px 100px rgba(10,15,40,.20);
      animation: card-rise .7s var(--ease-spring) both;
    }
    html.dark .login-card {
      background: rgba(28,28,30,.78) !important;
      border-color: rgba(255,255,255,.10);
    }
    @keyframes card-rise {
      from { opacity:0; transform: translateY(24px) scale(.96); }
      to   { opacity:1; transform: translateY(0) scale(1); }
    }

    /* ============ Flatpickr ============ */
    .flatpickr-calendar {
      background: rgba(255,255,255,.94) !important;
      backdrop-filter: blur(28px) saturate(180%);
      -webkit-backdrop-filter: blur(28px) saturate(180%);
      border: 0.5px solid rgba(255,255,255,.8) !important;
      box-shadow: var(--shadow-lg) !important;
      border-radius: 16px !important;
      color: rgb(var(--c-ink)) !important;
    }
    html.dark .flatpickr-calendar { background: rgba(44,44,46,.96) !important; border-color: rgba(255,255,255,.08) !important; }
    .flatpickr-calendar.arrowTop:before, .flatpickr-calendar.arrowTop:after { border-bottom-color: rgba(255,255,255,.94) !important; }
    .flatpickr-calendar.arrowBottom:before, .flatpickr-calendar.arrowBottom:after { border-top-color: rgba(255,255,255,.94) !important; }
    .flatpickr-months .flatpickr-month, .flatpickr-current-month input.cur-year, .flatpickr-monthDropdown-months { color: rgb(var(--c-ink)); fill: rgb(var(--c-ink)); }
    .flatpickr-monthDropdown-months { background: transparent; }
    span.flatpickr-weekday { color: rgb(var(--c-muted)) !important; font-weight: 500; }
    .flatpickr-day { color: rgb(var(--c-ink)); border-radius: 10px; transition: background .15s; }
    .flatpickr-day:hover, .flatpickr-day.prevMonthDay:hover, .flatpickr-day.nextMonthDay:hover { background: rgba(10,132,255,.10); border-color: transparent; }
    .flatpickr-day.today { border-color: rgb(var(--c-primary)); }
    .flatpickr-day.selected, .flatpickr-day.selected:hover { background: rgb(var(--c-primary)) !important; border-color: rgb(var(--c-primary)) !important; color: #fff !important; }
    .flatpickr-day.flatpickr-disabled, .flatpickr-day.prevMonthDay, .flatpickr-day.nextMonthDay { color: rgb(var(--c-muted)); opacity: .5; }
    .flatpickr-prev-month svg, .flatpickr-next-month svg { fill: rgb(var(--c-muted)); }

    /* ============ Dashboard glass tokens ============ */
    .dash-glass {
      background: rgba(255,255,255,.72);
      backdrop-filter: blur(28px) saturate(180%);
      -webkit-backdrop-filter: blur(28px) saturate(180%);
      border: 0.5px solid rgba(255,255,255,.7);
      box-shadow: var(--shadow-md);
    }
    .dash-glass-soft {
      background: rgba(255,255,255,.58);
      backdrop-filter: blur(20px) saturate(160%);
      -webkit-backdrop-filter: blur(20px) saturate(160%);
      border: 0.5px solid rgba(255,255,255,.55);
      box-shadow: var(--shadow-sm);
    }
    html.dark .dash-glass {
      background: rgba(28,28,30,.68);
      border-color: rgba(255,255,255,.08);
      box-shadow: 0 1px 2px rgba(0,0,0,.5), 0 12px 32px rgba(0,0,0,.35);
    }
    html.dark .dash-glass-soft { background: rgba(28,28,30,.55); border-color: rgba(255,255,255,.06); }

    .dash-hero {
      background:
        radial-gradient(900px 420px at 100% 0%, rgba(255,255,255,.20), transparent 60%),
        linear-gradient(135deg, #0A84FF 0%, #5E5CE6 50%, #BF5AF2 100%);
    }
    .grad-bg2g { background: linear-gradient(135deg, #0A84FF, #5E5CE6); }

    .dash-anim { opacity: 0; animation: dash-up .6s var(--ease-out) forwards; }
    @keyframes dash-up { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }

    .card-hover { transition: transform .35s var(--ease-out), box-shadow .35s var(--ease-out), border-color .35s; }
    .card-hover:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); border-color: rgba(255,255,255,.88); }
    html.dark .card-hover:hover { border-color: rgba(255,255,255,.14); box-shadow: 0 8px 24px rgba(0,0,0,.45), 0 24px 48px rgba(0,0,0,.35); }

    .press { transition: transform .12s var(--ease-spring); }
    .press:active { transform: scale(.94); }

    .dash-pill {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 10px; border-radius: 999px;
      font-size: 11px; font-weight: 600; letter-spacing: 0;
    }
    .dash-pill.urgent { background: rgba(255,69,58,.12); color: #D70015; }
    .dash-pill.watch { background: rgba(255,159,10,.14); color: #B25000; }
    .dash-pill.stable { background: rgba(52,199,89,.14); color: #1F8B3E; }
    html.dark .dash-pill.urgent { background: rgba(255,69,58,.22); color: #FF6961; }
    html.dark .dash-pill.watch { background: rgba(255,159,10,.22); color: #FFD60A; }
    html.dark .dash-pill.stable { background: rgba(48,209,88,.22); color: #30D158; }

    .live-dot2 { width: 7px; height: 7px; border-radius: 50%; background: #fff; animation: ping2 1.8s var(--ease-smooth) infinite; }
    @keyframes ping2 {
      0%   { box-shadow: 0 0 0 0   rgba(255,255,255,.55); }
      70%  { box-shadow: 0 0 0 9px rgba(255,255,255,0); }
      100% { box-shadow: 0 0 0 0   rgba(255,255,255,0); }
    }

    /* ============ SweetAlert — refined glass ============ */
    .swal2-popup {
      border-radius: 20px !important;
      background: rgba(255,255,255,.96) !important;
      backdrop-filter: blur(28px) saturate(180%);
      -webkit-backdrop-filter: blur(28px) saturate(180%);
      border: 0.5px solid rgba(255,255,255,.8);
      box-shadow: var(--shadow-xl) !important;
      font-family: 'Kanit', sans-serif !important;
      letter-spacing: -0.005em;
    }
    html.dark .swal2-popup {
      background: rgba(44,44,46,.96) !important;
      border-color: rgba(255,255,255,.08);
      color: rgb(var(--c-ink));
    }
    .swal2-title { font-weight: 600 !important; color: rgb(var(--c-ink)) !important; }
    .swal2-html-container { color: rgb(var(--c-ink)) !important; }
    .swal2-styled.swal2-confirm, .swal2-styled.swal2-cancel {
      border-radius: 12px !important;
      padding: 10px 22px !important;
      font-weight: 500 !important;
      box-shadow: var(--shadow-sm) !important;
      transition: all .15s var(--ease-spring) !important;
    }
    .swal2-styled.swal2-confirm:hover, .swal2-styled.swal2-cancel:hover { transform: translateY(-1px); filter: brightness(1.05); }
    .swal2-styled.swal2-confirm:active, .swal2-styled.swal2-cancel:active { transform: scale(.96); }
    /* Toast variant */
    .swal2-toast {
      border-radius: 16px !important;
      backdrop-filter: blur(20px) saturate(180%);
      box-shadow: var(--shadow-lg) !important;
    }

    /* Shimmer skeleton — replaces blocky animate-pulse */
    @keyframes shimmer {
      0%   { background-position: -400px 0; }
      100% { background-position: 400px 0; }
    }
    .animate-pulse {
      background: linear-gradient(90deg, rgba(0,0,0,.04) 0%, rgba(0,0,0,.08) 50%, rgba(0,0,0,.04) 100%);
      background-size: 800px 100%;
      animation: shimmer 1.6s var(--ease-smooth) infinite !important;
    }
    html.dark .animate-pulse {
      background: linear-gradient(90deg, rgba(255,255,255,.04) 0%, rgba(255,255,255,.08) 50%, rgba(255,255,255,.04) 100%);
      background-size: 800px 100%;
    }

    @media print {
      #appHeader, #sidebar, #bottomNav, .no-print { display:none !important; }
      #mainContent { margin:0 !important; padding:0 !important; }
    }
  </style>
</head>

<body class="font-sans text-ink bg-bg min-h-screen">

  <!-- ============ LOADING OVERLAY ============ -->
  <div id="loadingOverlay">
    <div class="lbox">
      <div class="spinner"></div>
      <div id="loadingText" class="text-primary font-medium text-sm">กำลังโหลด...</div>
    </div>
  </div>

  <!-- ============ LOGIN VIEW ============ -->
  <div id="loginView" class="login-hero min-h-screen flex items-center justify-center p-5">
    <div class="login-card w-full max-w-md rounded-[28px] p-7 sm:p-9">
      <div class="text-center mb-7">
        <div class="mx-auto w-16 h-16 rounded-2xl bg-primary/10 flex items-center justify-center mb-3">
          <i data-lucide="heart-handshake" class="w-8 h-8 text-primary"></i>
        </div>
        <h1 data-app-name class="text-xl font-600 text-ink leading-tight">ระบบดูแลผู้มีภาวะพึ่งพิงในชุมชน</h1>
        <p class="text-muted text-sm mt-1">เข้าสู่ระบบเพื่อใช้งาน</p>
      </div>

      <form id="loginForm" class="space-y-4" autocomplete="on">
        <div>
          <label class="block text-sm text-muted mb-1.5">ชื่อผู้ใช้</label>
          <div class="relative">
            <i data-lucide="user" class="w-5 h-5 text-muted absolute left-3 top-1/2 -translate-y-1/2"></i>
            <input id="loginUsername" type="text" inputmode="text"
              class="w-full h-12 pl-11 pr-3 rounded-xl border border-line focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none"
              placeholder="username" />
          </div>
        </div>

        <div>
          <label class="block text-sm text-muted mb-1.5">รหัสผ่าน</label>
          <div class="relative">
            <i data-lucide="lock" class="w-5 h-5 text-muted absolute left-3 top-1/2 -translate-y-1/2"></i>
            <input id="loginPassword" type="password"
              class="w-full h-12 pl-11 pr-11 rounded-xl border border-line focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none"
              placeholder="••••••••" />
            <button type="button" id="togglePw" class="absolute right-3 top-1/2 -translate-y-1/2 text-muted">
              <i data-lucide="eye" class="w-5 h-5"></i>
            </button>
          </div>
        </div>

        <button type="submit"
          class="btn w-full h-12 rounded-xl bg-primary text-white font-500 shadow-soft hover:bg-primary-2 flex items-center justify-center gap-2">
          <i data-lucide="log-in" class="w-5 h-5"></i> เข้าสู่ระบบ
        </button>
      </form>

      <p class="text-center text-xs text-muted mt-6">© ระบบดูแลผู้มีภาวะพึ่งพิงในชุมชน</p>
    </div>
  </div>

  <!-- ============ APP SHELL ============ -->
  <div id="appShell" class="hidden">

    <!-- Sidebar (Desktop) -->
    <aside id="sidebar" class="hidden md:flex flex-col fixed top-0 left-0 h-full w-64 bg-card border-r border-line z-40">
      <div class="h-16 flex items-center gap-2.5 px-5 border-b border-line">
        <div class="w-9 h-9 rounded-xl bg-primary flex items-center justify-center shrink-0">
          <i data-lucide="heart-handshake" class="w-5 h-5 text-white"></i>
        </div>
        <div class="leading-tight">
          <div data-app-name class="text-sm font-600 text-ink">ระบบดูแลผู้พึ่งพิง</div>
          <div class="text-[11px] text-muted">ในชุมชน</div>
        </div>
      </div>
      <nav id="sidebarMenu" class="flex-1 overflow-y-auto p-3 space-y-1"></nav>
      <div class="p-3 border-t border-line">
        <button onclick="logout()" class="btn w-full h-11 rounded-xl bg-danger/10 text-danger font-500 flex items-center justify-center gap-2 hover:bg-danger/20">
          <i data-lucide="log-out" class="w-5 h-5"></i> ออกจากระบบ
        </button>
      </div>
    </aside>

    <!-- Header -->
    <header id="appHeader" class="sticky top-0 z-30 h-16 bg-card/90 backdrop-blur border-b border-line md:ml-64 flex items-center justify-between px-4">
      <div class="flex items-center gap-2">
        <button class="md:hidden p-2 -ml-2 text-ink" onclick="openDrawer()">
          <i data-lucide="menu" class="w-6 h-6"></i>
        </button>
        <h2 id="pageTitle" class="text-base sm:text-lg font-600 text-ink">Dashboard</h2>
      </div>
      <div class="flex items-center gap-2.5">
        <button onclick="toggleTheme()" class="p-2 rounded-lg text-muted hover:bg-subtle" title="สลับโหมดสว่าง/มืด">
          <i data-lucide="moon" id="themeIcon" class="w-5 h-5"></i>
        </button>
        <div class="text-right leading-tight hidden sm:block">
          <div id="hdrName" class="text-sm font-500 text-ink">-</div>
          <div id="hdrRole" class="text-[11px] text-muted">-</div>
        </div>
        <div id="hdrAvatar" class="w-9 h-9 rounded-full bg-primary/10 text-primary flex items-center justify-center font-600">A</div>
      </div>
    </header>

    <!-- Main Content -->
    <main id="mainContent" class="md:ml-64 px-4 py-5 pb-24 md:pb-8 max-w-5xl mx-auto">
      <div id="viewContainer"></div>
    </main>

    <!-- Bottom Navigation (Mobile) -->
    <nav id="bottomNav" class="md:hidden fixed bottom-0 left-0 right-0 z-40 bg-card border-t border-line h-16 flex items-stretch justify-around px-1"></nav>
  </div>

  <!-- ============ DRAWER (Mobile full menu) ============ -->
  <div id="drawerBackdrop" onclick="closeDrawer()"></div>
  <div id="drawer" class="flex flex-col">
    <div class="h-16 flex items-center justify-between px-5 border-b border-line">
      <div class="flex items-center gap-2.5">
        <div class="w-9 h-9 rounded-xl bg-primary flex items-center justify-center">
          <i data-lucide="heart-handshake" class="w-5 h-5 text-white"></i>
        </div>
        <div class="text-sm font-600">เมนูทั้งหมด</div>
      </div>
      <button onclick="closeDrawer()" class="p-2 text-muted"><i data-lucide="x" class="w-5 h-5"></i></button>
    </div>
    <nav id="drawerMenu" class="flex-1 overflow-y-auto p-3 space-y-1"></nav>
    <div class="p-3 border-t border-line">
      <button onclick="logout()" class="btn w-full h-11 rounded-xl bg-danger/10 text-danger font-500 flex items-center justify-center gap-2">
        <i data-lucide="log-out" class="w-5 h-5"></i> ออกจากระบบ
      </button>
    </div>
  </div>

  <!-- ============ APP SCRIPT ============ -->
  <script src="app.js"></script>
</body>
</html>
